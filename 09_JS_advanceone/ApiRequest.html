<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="background-color: #212121;">
    <!-- 0	UNSENT	Client has been created. open() not called yet.
1	OPENED	open() has been called.
2	HEADERS_RECEIVED	send() has been called, and headers and status are available.
3	LOADING	Downloading; responseText holds partial data.
4	DONE	The operation is complete. -->

<div class="card">
    <button id="getUserInfo">Get User Info</button>
</div>
</body>
<script>
    const requestUrl = 'https://api.github.com/users/hiteshchoudhary'
    const xhr = new XMLHttpRequest();
    xhr.open('GET', requestUrl)
    xhr.onreadystatechange = function(){
        console.log(xhr.readyState);
        if (xhr.readyState === 4) {
            const data = JSON.parse(this.responseText) // parses string to JSON format
            console.log(typeof data);
            console.log(data.followers);
        }
    }

   const card = document.querySelector('.card')
   const button = document.getElementById('getUserInfo');
   xhr.onreadystatechange = function(){

       button.addEventListener('click', (e) => {
            const data = JSON.parse(this.responseText)
            card.innerHTML = `<img src="${data.avatar_url}" alt="hiteshchoudhary" style="width: 100px; height: 100px; border-radius: 50%;">
            <h2 style="color: white;">${data.name}</h2>
            <p style="color: white;">Followers: ${data.followers}</p>`

        })
   }
    xhr.send();
</script>

<!--Also V8 engine was dicussed and I did a bit of research on it using gemini to understand the console.log behavior that it executes-->
</html>
